services:
  - type: web
    name: quicktools-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: USE_PROXY
        value: "false"